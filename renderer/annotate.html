<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=420">
<title>标注</title>
<style>
/* ── Reset ──────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0c0c10;
  --surface: #16161f;
  --surface-hover: #1e1e2a;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.1);
  --orange: #ff6b35;
  --orange-glow: rgba(255,107,53,0.2);
  --green: #4ecdc4;
  --green-glow: rgba(78,205,196,0.1);
  --text-primary: #ece8e1;
  --text-secondary: #8a857e;
  --text-muted: #5a5650;
  --font: 'Sora', -apple-system, 'Segoe UI', sans-serif;
  --radius: 8px;
  --radius-sm: 6px;
}
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  width: 460px;
  height: 600px;
  overflow: hidden;
  user-select: none;
}
.container {
  padding: 12px 18px;
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 6px;
}

/* ── 标题栏 ──────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-left .icon { font-size: 18px; }
.header-left h2 { font-size: 15px; font-weight: 600; }
.header-actions {
  display: flex;
  gap: 4px;
}
.icon-btn {
  width: 30px; height: 30px;
  border: none; border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-secondary);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  border: 1px solid var(--border);
}
.icon-btn:hover {
  background: var(--surface-hover);
  color: var(--text-primary);
  border-color: var(--border-hover);
}
.icon-btn.active {
  background: var(--orange-glow);
  color: var(--orange);
  border-color: var(--orange);
}
.icon-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── 内容预览 ──────────────────────────── */
.preview-box {
  padding: 8px 10px;
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 6px;
  max-height: 90px;
  overflow-y: auto;
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-secondary);
  word-break: break-all;
}
.preview-box.image-preview {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 4px;
  max-height: 120px;
}
.preview-box.image-preview img {
  max-height: 100px;
  max-width: 100%;
  border-radius: 4px;
  object-fit: contain;
}

/* ── AI 分析框 ──────────────────────────── */
.analysis-box {
  margin-bottom: 6px;
  border-radius: var(--radius);
  border: 1px solid var(--green-glow);
  background: rgba(78,205,196,0.04);
  overflow-y: auto;
  display: none;
  max-height: 160px;
}
.analysis-box.visible { display: block; }
.analysis-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
}
.analysis-toggle {
  background: none; border: none;
  color: var(--text-muted); font-size: 10px;
  cursor: pointer; font-family: var(--font);
}
.analysis-toggle:hover { color: var(--text-secondary); }
.analysis-body {
  padding: 0 12px 10px;
  font-size: 11px;
  line-height: 1.5;
}
.analysis-loading {
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.analysis-loading .spinner {
  width: 12px; height: 12px;
  border: 2px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.analysis-label {
  font-weight: 600;
  color: var(--text-muted);
  font-size: 10px;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 2px;
}
.analysis-summary p {
  color: var(--text-secondary);
  margin-bottom: 8px;
}
.analysis-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 2px;
}
.analysis-tag {
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--green-glow);
  color: var(--green);
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.analysis-tag:hover {
  background: rgba(78,205,196,0.18);
  border-color: rgba(78,205,196,0.3);
}
.analysis-tag.added {
  background: var(--orange-glow);
  color: var(--orange);
  border-color: var(--orange);
}
.analysis-no-key {
  color: var(--text-muted);
  font-size: 11px;
  padding: 6px 0;
}

/* ── OCR 结果 ──────────────────────────── */
.ocr-box {
  margin-bottom: 10px;
  padding: 8px 10px;
  background: rgba(78,205,196,0.06);
  border: 1px solid rgba(78,205,196,0.15);
  border-radius: var(--radius);
  font-size: 11px;
  color: var(--green);
  display: none;
}
.ocr-box.visible { display: block; }
.ocr-label { font-weight: 600; margin-bottom: 4px; }
.ocr-text { line-height: 1.5; color: var(--text-secondary); }
.ocr-loading { font-size: 11px; color: var(--text-muted); }

/* ── 表单 ──────────────────────────────── */
.form-group {
  margin-bottom: 4px;
}
.form-group:last-of-type {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.form-group:last-of-type .form-textarea {
  flex: 1;
}
.form-group label {
  display: block;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 3px;
  letter-spacing: 0.3px;
}
.form-input, .form-textarea {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-primary);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus, .form-textarea:focus {
  border-color: var(--orange);
  box-shadow: 0 0 0 2px var(--orange-glow);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-muted); }
.form-textarea {
  resize: none;
  height: 72px;
  line-height: 1.5;
}

/* ── 按钮 ──────────────────────────────── */
.actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
  padding-top: 8px;
}
.btn {
  flex: 1;
  padding: 9px;
  border: none;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}
.btn-cancel {
  background: var(--surface);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}
.btn-cancel:hover { background: var(--surface-hover); }
.btn-save {
  background: linear-gradient(135deg, var(--orange), #cc4a1a);
  color: #fff;
}
.btn-save:hover { opacity: 0.9; }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">
  <!-- 标题栏 + 快捷操作 -->
  <div class="header">
    <div class="header-left">
      <span class="icon">📌</span>
      <h2>标注收集内容</h2>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="copyBtn" title="复制内容到剪贴板">📋</button>
      <button class="icon-btn" id="analyzeBtn" title="AI 分析内容">🤖</button>
    </div>
  </div>

  <!-- 内容预览 -->
  <div class="preview-box" id="previewBox">
    <span style="color:var(--text-muted)">等待内容…</span>
  </div>

  <!-- AI 分析结果 -->
  <div class="analysis-box" id="analysisBox">
    <div class="analysis-header">
      <span>🤖 AI 内容分析</span>
      <button class="analysis-toggle" id="analysisToggle">收起</button>
    </div>
    <div class="analysis-body" id="analysisBody">
      <div class="analysis-loading" id="analysisLoading">
        <div class="spinner"></div>
        <span>悠仁正在思考…</span>
      </div>
      <div id="analysisDone" style="display:none">
        <div class="analysis-summary">
          <span class="analysis-label">📝 内容摘要</span>
          <p id="analysisSummary"></p>
        </div>
        <div>
          <span class="analysis-label">🏷️ 推荐标签（点击添加）</span>
          <div class="analysis-tags" id="analysisTagList"></div>
        </div>
      </div>
      <div id="analysisNoKey" class="analysis-no-key" style="display:none">
        设置 GEMINI_API_KEY 环境变量后可用 AI 分析 ✨
      </div>
    </div>
  </div>

  <!-- OCR 结果 -->
  <div class="ocr-box" id="ocrBox">
    <div class="ocr-label">📖 图片文字识别</div>
    <div class="ocr-loading" id="ocrLoading">识别中…</div>
    <div class="ocr-text" id="ocrText"></div>
  </div>

  <!-- 表单 -->
  <div class="form-group">
    <label>🏷️ 标签（逗号分隔）</label>
    <input class="form-input" id="tagsInput" placeholder="例如：设计, 灵感, 参考" autofocus />
  </div>

  <div class="form-group">
    <label>🔗 来源网址</label>
    <input class="form-input" id="sourceInput" placeholder="从哪复制的？" />
  </div>

  <div class="form-group">
    <label>💬 备注</label>
    <textarea class="form-textarea" id="notesInput" placeholder="为什么复制这个？当时的心情？"></textarea>
  </div>

  <!-- 操作按钮 -->
  <div class="actions">
    <button class="btn btn-cancel" id="cancelBtn">取消</button>
    <button class="btn btn-save" id="saveBtn">添加到收集器</button>
  </div>
</div>
<script src="annotate.js"></script>
</body>
</html>
